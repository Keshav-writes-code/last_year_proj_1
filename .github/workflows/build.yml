name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v2
      
      - name: Build
        run: |
          cargo build --release
          
      - name: Create Artifacts Directory
        run: |
          mkdir -p artifacts
          
      - name: Copy Build Outputs (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: cp target/release/* artifacts/
        
      - name: Copy Build Outputs (Windows)
        if: matrix.os == 'windows-latest'
        run: copy target\release\* artifacts\
        
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: built-binaries-${{ matrix.os }}
          path: artifacts/